# travel.henzi.org — suite hub
#
# Web root:  /usr/local/www/travel.henzi.org/   (static landing page + future tools)
# Flask app: Docker container, host port 5847 → container port 5000
#
# Tools mounted under this domain (add a location block per tool as they ship):
#   /        → static landing page (nginx serves directly)
#   /plan    → Weather Horizon planner (Flask/Gunicorn via Docker)
#   /api/    → Weather Horizon API    (Flask/Gunicorn via Docker)
#
# SSL: run  certbot --nginx -d travel.henzi.org  after enabling this config.
#      Certbot will append the :443 block and HTTP→HTTPS redirect automatically.

server {
    listen 80;
    server_name travel.henzi.org;

    access_log /var/log/nginx/travel.henzi.org.access.log combined;
    error_log  /var/log/nginx/travel.henzi.org.error.log warn;

    root  /usr/local/www/travel.henzi.org;
    index index.html;

    # ── Landing page & future static tools ───────────────────────────────────
    # Nginx serves everything it finds in the web root directly.
    # Only falls through to Flask for /plan and /api/.
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Shared proxy settings (DRY) ──────────────────────────────────────────
    # Referenced by each proxied location block below.
    # Note: proxy_set_header directives must be repeated per block in nginx;
    # define them in a shared include if this list grows long.

    # ── Weather Horizon — planner UI ─────────────────────────────────────────
    location /plan {
        proxy_pass         http://127.0.0.1:5847;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Weather Horizon — forecast API ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5847;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        add_header         Cache-Control "no-store";
    }

    # ── Weather Horizon — app static assets (/static/css, /static/js …) ──────
    location /static/ {
        proxy_pass         http://127.0.0.1:5847;
        proxy_set_header   Host              $host;
        expires            30d;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── Block hidden files (.env, .git, etc.) ────────────────────────────────
    location ~ /\. {
        deny all;
    }
}

# certbot --nginx -d travel.henzi.org
# ↑ appends :443 server block and HTTP→HTTPS redirect below this line
