{% if top3 %}
<div class="bur-picks">
  {% for rec in top3 %}
  {% set i = loop.index0 %}
  <button class="bur-pick-card{% if i == 0 %} bur-pick-card--top{% endif %}" data-name="{{ rec.name }}">
    <div class="bur-pick-tag">
      <span>A-{{ loop.index }}</span>
      <span class="bur-pick-tag-dir">{{ rec.direction | upper }}</span>
    </div>
    <div class="bur-pick-body">
      <div class="bur-pick-name">{{ rec.name }}</div>
      <div class="bur-pick-foot">
        <div>
          <span class="bur-pick-score">{{ rec.score }}</span>
          <span class="bur-pick-score-denom">/100</span>
        </div>
        <div class="bur-pick-meta">
          <div>{{ rec.dry_window }}D DRY</div>
        </div>
      </div>
    </div>
  </button>
  {% endfor %}
</div>
{% else %}
<div class="bur-picks-empty">
  NO QUALIFYING ROUTES FOR CURRENT PARAMETERS.
  RAISE RAIN TOLERANCE OR SELECT A DIFFERENT DEPARTURE DAY.
</div>
{% endif %}
